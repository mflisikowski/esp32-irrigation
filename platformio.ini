[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.partitions = no_ota.csv
extra_scripts = extra_script.py

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    knolleary/PubSubClient @ ^2.8
    esp32async/ESPAsyncWebServer @ ^3.11.0
    esp32async/AsyncTCP @ ^3.3.0

# ─── ESP32-C6 (gdy przyjdzie płytka) ────────────────────────────────────────
# Różnice vs esp32dev: podmień 2 linie w [env:esp32-c6]:
#   board = esp32-c6-devkitc-1    ← zamiast: esp32dev
#   board_build.partitions = no_ota.csv  ← to samo (lub partitions.csv dla OTA)
# Wgrywanie: pio run -e esp32-c6 -t upload && pio run -e esp32-c6 -t uploadfs
[env:esp32-c6]
platform = espressif32
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.partitions = no_ota.csv
extra_scripts = extra_script.py

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    knolleary/PubSubClient @ ^2.8
    esp32async/ESPAsyncWebServer @ ^3.11.0
    esp32async/AsyncTCP @ ^3.3.0
